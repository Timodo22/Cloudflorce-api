name = "cloudforceapi"
main = "index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# Bind a D1 database. 
# Local development uses local SQLite. 
# Production uses Cloudflare's edge D1.
[[d1_databases]]
binding = "DB" # This is how we access it in JS: env.DB
database_name = "cloudforce"
database_id = "c4fc330f-9677-4736-aea0-468f0143d60b" # Replace with real ID after `wrangler d1 create`
